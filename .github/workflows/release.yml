name: release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun run packages/opencode/script/build.ts \
            --single \
            --skip-embed-web-ui \
            --skip-install

      - name: Rename and verify
        run: |
          BINARY_NAME="aiplus-native-darwin-arm64"
          BUILT=$(find packages/opencode/dist -name "opencode" -type f | head -1)
          if [ -z "$BUILT" ]; then
            echo "ERROR: built binary not found"
            find packages/opencode/dist -type f
            exit 1
          fi
          cp "$BUILT" "$BINARY_NAME"
          chmod +x "$BINARY_NAME"
          echo "Binary: $BINARY_NAME ($(du -h "$BINARY_NAME" | cut -f1))"

      - name: Smoke test
        run: ./aiplus-native-darwin-arm64 --version || true

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" aiplus-native-darwin-arm64 \
            --clobber --repo "${{ github.repository }}"
